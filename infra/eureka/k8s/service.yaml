# =============================================================================
# SERVICE: eureka
# ClusterIP interno. Los microservicios lo registran en defaultZone.
# URL interna: http://eureka:8761/eureka
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: eureka
  namespace: ecom
  labels:
    app: eureka
    app.kubernetes.io/component: infrastructure
spec:
  type: ClusterIP
  selector:
    app: eureka
  ports:
    - name: http
      port: 8761
      targetPort: 8761
      protocol: TCP
