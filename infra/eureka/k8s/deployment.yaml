# =============================================================================
# DEPLOYMENT: eureka
# Netflix Eureka Server - Service Discovery.
# Se mantiene para compatibilidad con lb:// del Gateway.
# Depende de: config-server (init container)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka
  namespace: ecom
  labels:
    app: eureka
    app.kubernetes.io/component: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: eureka
    spec:
      initContainers:
        # Espera que el Config Server esté saludable antes de arrancar
        - name: wait-for-config-server
          image: curlimages/curl:8.5.0
          command:
            - sh
            - -c
            - |
              echo "Esperando Config Server..."
              until curl -sf http://config-server:8888/actuator/health; do
                echo "Config Server no disponible, reintentando en 5s..."
                sleep 5
              done
              echo "Config Server listo!"
      containers:
        - name: eureka
          image: erickmijael17/ecom-eureka:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8761
              name: http
          env:
            - name: SERVER_PORT
              value: "8761"
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: CONFIG_SERVER_URL
              value: "http://config-server:8888"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ecom-global-secret
                  key: jwt-secret
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8761
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8761
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 15
            timeoutSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      restartPolicy: Always
