server:
  port: 9091

spring:
  datasource:
    url: jdbc:mysql://localhost:3391/db_producto?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:7081/eureka
      
springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.upeu.producto: DEBUG