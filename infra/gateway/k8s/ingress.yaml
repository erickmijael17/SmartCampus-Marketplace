# =============================================================================
# INGRESS: gateway
# Expone el API Gateway al exterior usando NGINX Ingress Controller.
# Ajusta host: api.smartcampus.local para tu dominio real.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway-ingress
  namespace: ecom
  labels:
    app: gateway
    app.kubernetes.io/component: infrastructure
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # CORS habilitado para llamadas desde frontend
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, PUT, POST, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type"
    # Anotación cert-manager para SSL automático
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
    - host: api.smartcampus.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
  tls:
    - hosts:
        - api.smartcampus.local
      secretName: smartcampus-tls
