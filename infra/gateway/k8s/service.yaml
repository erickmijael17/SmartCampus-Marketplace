# =============================================================================
# SERVICE: gateway
# LoadBalancer o ClusterIP según el entorno.
# En producción con Ingress → ClusterIP.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: ecom
  labels:
    app: gateway
    app.kubernetes.io/component: infrastructure
spec:
  type: ClusterIP
  selector:
    app: gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
