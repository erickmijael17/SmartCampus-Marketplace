spring:
  cloud:
    gateway:
      forwarded:
        enabled: false
      routes:
        # --- MVP ACTIVO ---
        - id: auth-route
          uri: lb://AUTH-MS
          predicates:
            - Path=/auth/**
        - id: persona-route
          uri: lb://PERSONA-MS
          predicates:
            - Path=/api/v1/personas/**
        - id: categoria-route
          uri: lb://CATEGORIA-MS
          predicates:
            - Path=/api/v1/categorias/**
        - id: producto-route
          uri: lb://PRODUCTO-MS
          predicates:
            - Path=/api/v1/productos/**
        - id: producto-instancia
          uri: lb://PRODUCTO-MS
          predicates:
            - Path=/api/v1/producto/instancia
        - id: publicacion-route
          uri: lb://PUBLICACION-MS
          predicates:
            - Path=/api/v1/publicaciones/**
        - id: media-route
          uri: lb://MEDIA-MS
          predicates:
            - Path=/api/v1/media/**
        - id: favoritos-route
          uri: lb://FAVORITOS-MS
          predicates:
            - Path=/api/v1/favoritos/**
        - id: calificacion-route
          uri: lb://CALIFICACION-MS
          predicates:
            - Path=/api/v1/calificaciones/**
        - id: chat-route
          uri: lb://CHAT-MS
          predicates:
            - Path=/api/v1/chats/**
        - id: orden-route
          uri: lb://ORDEN-MS
          predicates:
            - Path=/api/v1/ordenes/**
        - id: pago-route
          uri: lb://PAGO-MS
          predicates:
            - Path=/api/v1/pagos/**
eureka:
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  prometheus:
    metrics:
      export:
        enabled: true
