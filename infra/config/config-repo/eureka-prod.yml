spring:
  application:
    name: eureka

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  server:
    enable-self-preservation: true
    renewal-percent-threshold: 0.5
    eviction-interval-timer-in-ms: 10000

management:
  endpoints:
    web:
      exposure:
        include: "*"