spring:
  cloud:
    gateway:
      forwarded:
        enabled: false
      routes:
        # --- MVP ACTIVO: identidad y perfil ---
        - id: auth-route
          uri: lb://AUTH-MS
          predicates:
            - Path=/auth/**
        - id: persona-route
          uri: lb://AUTH-MS
          predicates:
            - Path=/api/v1/personas/**

        # --- MVP ACTIVO: productos y categorias ---
        - id: categoria-route
          uri: lb://CATEGORIA-MS
          predicates:
            - Path=/api/v1/categorias/**
        - id: categoria-swagger
          uri: lb://CATEGORIA-MS
          predicates:
            - Path=/categoria-ms/swagger-ui/**,/categoria-ms/v3/api-docs/**
        - id: producto-route
          uri: lb://PRODUCTO-MS
          predicates:
            - Path=/api/v1/productos/**
        - id: producto-instancia
          uri: lb://PRODUCTO-MS
          predicates:
            - Path=/api/v1/producto/instancia
        - id: producto-swagger
          uri: lb://PRODUCTO-MS
          predicates:
            - Path=/producto-ms/swagger-ui/**,/producto-ms/v3/api-docs/**

        # --- MVP ACTIVO: capa social ---
        - id: publicacion-route
          uri: lb://PUBLICACION-MS
          predicates:
            - Path=/api/v1/publicaciones/**
        - id: publicacion-swagger
          uri: lb://PUBLICACION-MS
          predicates:
            - Path=/publicacion-ms/swagger-ui/**,/publicacion-ms/v3/api-docs/**
        - id: media-route
          uri: lb://MEDIA-MS
          predicates:
            - Path=/api/v1/media/**
        - id: media-swagger
          uri: lb://MEDIA-MS
          predicates:
            - Path=/media-ms/swagger-ui/**,/media-ms/v3/api-docs/**
        - id: favoritos-route
          uri: lb://FAVORITOS-MS
          predicates:
            - Path=/api/v1/favoritos/**
        - id: favoritos-swagger
          uri: lb://FAVORITOS-MS
          predicates:
            - Path=/favoritos-ms/swagger-ui/**,/favoritos-ms/v3/api-docs/**
        - id: calificacion-route
          uri: lb://CALIFICACION-MS
          predicates:
            - Path=/api/v1/calificaciones/**
        - id: calificacion-swagger
          uri: lb://CALIFICACION-MS
          predicates:
            - Path=/calificacion-ms/swagger-ui/**,/calificacion-ms/v3/api-docs/**
        - id: chat-route
          uri: lb://CHAT-MS
          predicates:
            - Path=/api/v1/chats/**
        - id: chat-swagger
          uri: lb://CHAT-MS
          predicates:
            - Path=/chat-ms/swagger-ui/**,/chat-ms/v3/api-docs/**

        # --- MVP ACTIVO: checkout ---
        - id: orden-route
          uri: lb://ORDEN-MS
          predicates:
            - Path=/api/v1/ordenes/**
        - id: orden-swagger
          uri: lb://ORDEN-MS
          predicates:
            - Path=/orden-ms/swagger-ui/**,/orden-ms/v3/api-docs/**
        - id: pago-route
          uri: lb://PAGO-MS
          predicates:
            - Path=/api/v1/pagos/**
        - id: pago-swagger
          uri: lb://PAGO-MS
          predicates:
            - Path=/pago-ms/swagger-ui/**,/pago-ms/v3/api-docs/**
eureka:
  instance:
    hostname: localhost
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${local.server.port:${server.port}}
    metadata-map:
      instance-port: ${local.server.port:${server.port}}
  client:
    service-url:
      defaultZone: http://localhost:18761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
