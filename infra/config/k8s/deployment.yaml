# =============================================================================
# DEPLOYMENT: config-server
# Spring Cloud Config Server en modo nativo.
# Lee los archivos YAML del ConfigMap montado en /config-repo.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: ecom
  labels:
    app: config-server
    app.kubernetes.io/component: infrastructure
    app.kubernetes.io/version: "latest"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
        - name: config-server
          image: erickmijael17/ecom-config-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8888
              name: http
          env:
            - name: SERVER_PORT
              value: "8888"
            - name: SPRING_PROFILES_ACTIVE
              value: "native"
            - name: CONFIG_REPO_LOCATION
              value: "file:/config-repo"
          volumeMounts:
            - name: config-repo-volume
              mountPath: /config-repo
              readOnly: true
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8888
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8888
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 10
            timeoutSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config-repo-volume
          configMap:
            name: config-repo
      restartPolicy: Always
