spring:
  application:
    name: calificacion-ms
  profiles:
    active: dev
  config:
    import: 'optional:configserver:${CONFIG_SERVER_URL:http://localhost:18888}'
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
