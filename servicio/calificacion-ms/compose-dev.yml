name: calificacion-ms-dev

services:
  postgres-calificacion-ms-dev:
    image: postgres:16-alpine
    container_name: postgres-calificacion-ms-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: calificacion_ms_db
      POSTGRES_USER: ecom
      POSTGRES_PASSWORD: ecom
    ports:
      - "15443:5432"
    volumes:
      - calificacion_ms_dev_data:/var/lib/postgresql/data

volumes:
  calificacion_ms_dev_data:
