spring:
  application:
    name: pago-ms
  profiles:
    active: dev

  config:
    import: "optional:file:./.env[.properties],optional:file:../../.env[.properties],optional:configserver:${CONFIG_SERVER_URL:http://localhost:18888}"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO

app:
  frontend-url: ${FRONTEND_URL:http://localhost:4200}

mercadopago:
  access-token: ${MP_ACCESS_TOKEN}
  public-key: ${MP_PUBLIC_KEY:}
  success-url: ${MP_SUCCESS_URL:${FRONTEND_URL:http://localhost:4200}/pago/exito}
  failure-url: ${MP_FAILURE_URL:${FRONTEND_URL:http://localhost:4200}/pago/fallo}
  pending-url: ${MP_PENDING_URL:${FRONTEND_URL:http://localhost:4200}/pago/pendiente}
  auto-return-enabled: ${MP_AUTO_RETURN_ENABLED:false}
