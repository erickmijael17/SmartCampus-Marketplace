name: ecom-pago-dev

services:
  postgres-pago-dev:
    image: postgres:16-alpine
    container_name: ecom-postgres-pago-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecom_pago_db
      POSTGRES_USER: ecom
      POSTGRES_PASSWORD: ecom
    ports:
      - "15435:5432"
    volumes:
      - ecom_pago_dev_data:/var/lib/postgresql/data

volumes:
  ecom_pago_dev_data:
