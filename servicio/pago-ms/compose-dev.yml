name: pago-dev

services:
  postgres-pago-dev:
    image: postgres:16-alpine
    container_name: postgres-pago-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: pago_db
      POSTGRES_USER: ecom
      POSTGRES_PASSWORD: ecom
    ports:
      - "15435:5432"
    volumes:
      - pago_dev_data:/var/lib/postgresql/data

volumes:
  pago_dev_data:
