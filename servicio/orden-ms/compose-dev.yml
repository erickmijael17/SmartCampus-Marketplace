name: orden-dev

services:
  postgres-orden-dev:
    image: postgres:16-alpine
    container_name: postgres-orden-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: orden_db
      POSTGRES_USER: ecom
      POSTGRES_PASSWORD: ecom
    ports:
      - "15436:5432"
    volumes:
      - orden_dev_data:/var/lib/postgresql/data

volumes:
  orden_dev_data:
