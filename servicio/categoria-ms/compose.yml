name: ecom-categoria-ms-prod

services:
  postgres-categoria-ms:
    image: postgres:16-alpine
    container_name: ecom-postgres-categoria-ms
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - ecom_categoria_data:/var/lib/postgresql/data
    ports:
      - '25435:5432'
    networks:
      - ecom-categoria-ms-int

  categoria-ms:
    build: .
    container_name: ecom-categoria-ms
    restart: unless-stopped
    depends_on:
      postgres-categoria-ms:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: ecom-postgres-categoria-ms
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    ports:
      - '8045:8080'
    volumes:
      - ./logs:/app/logs
    networks:
      - ecom-categoria-ms-int
      - ecom-prod-net

volumes:
  ecom_categoria_data:

networks:
  ecom-prod-net:
    external: true
    name: ecom-prod-net
  ecom-categoria-ms-int:
    name: ecom-categoria-ms-int
