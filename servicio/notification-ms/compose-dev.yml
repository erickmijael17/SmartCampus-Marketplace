name: ecom-notification-ms-dev

services:
  postgres-notification-ms-dev:
    image: postgres:16-alpine
    container_name: ecom-postgres-notification-ms-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecom_notification_ms_db
      POSTGRES_USER: ecom
      POSTGRES_PASSWORD: ecom
    ports:
      - "15445:5432"
    volumes:
      - ecom_notification_ms_dev_data:/var/lib/postgresql/data

volumes:
  ecom_notification_ms_dev_data:
