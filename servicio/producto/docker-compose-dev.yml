name: producto-dev

services:
  mysql-producto-dev:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_producto
    ports:
      - "3391:3306" # Tu máquina (cliente externo) → MySQL dev	
    volumes:
      - mysql_producto_dev_data:/var/lib/mysql

volumes:
  mysql_producto_dev_data: