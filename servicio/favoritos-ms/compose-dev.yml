name: ecom-favoritos-ms-dev

services:
  postgres-favoritos-ms-dev:
    image: postgres:16-alpine
    container_name: ecom-postgres-favoritos-ms-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecom_favoritos_ms_db
      POSTGRES_USER: ecom
      POSTGRES_PASSWORD: ecom
    ports:
      - "15447:5432"
    volumes:
      - ecom_favoritos_ms_dev_data:/var/lib/postgresql/data

volumes:
  ecom_favoritos_ms_dev_data:
