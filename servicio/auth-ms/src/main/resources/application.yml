spring:
  application:
    name: auth-ms
  profiles:
    active: dev

  config:
    #import: "optional:configserver:http://localhost:18888"
    #import: "optional:configserver:http://config-server:8888"
    #import: "optional:configserver:http://host.docker.internal:18888"
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:18888}"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
