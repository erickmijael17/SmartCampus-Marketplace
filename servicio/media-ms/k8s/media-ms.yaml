# =============================================================================
# MEDIA-MS: Secret + PostgreSQL + Microservicio + HPA + PVC para archivos
# Gestión de archivos multimedia (imágenes, documentos) del marketplace
# Incluye PVC adicional para almacenamiento de archivos locales
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: media-ms-secret
  namespace: ecom
  labels:
    app: media-ms
type: Opaque
stringData:
  db-name: "media_db"
  db-user: "media_user"
  db-pass: "media_db_secure_2024"
---
# PVC para base de datos
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-ms-postgres-pvc
  namespace: ecom
  labels:
    app: postgres-media
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
# PVC para archivos media (imágenes, documentos)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-ms-files-pvc
  namespace: ecom
  labels:
    app: media-ms
spec:
  accessModes:
    - ReadWriteMany  # RWX para múltiples réplicas
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-media
  namespace: ecom
  labels:
    app: postgres-media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-media
  template:
    metadata:
      labels:
        app: postgres-media
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: media-ms-secret
                  key: db-name
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: media-ms-secret
                  key: db-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: media-ms-secret
                  key: db-pass
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "media_user"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: media-ms-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-media
  namespace: ecom
spec:
  type: ClusterIP
  selector:
    app: postgres-media
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-ms
  namespace: ecom
  labels:
    app: media-ms
    app.kubernetes.io/component: microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: media-ms
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: media-ms
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      initContainers:
        - name: wait-for-config-server
          image: curlimages/curl:8.5.0
          command: ["sh", "-c", "until curl -sf http://config-server:8888/actuator/health; do sleep 5; done"]
        - name: wait-for-eureka
          image: curlimages/curl:8.5.0
          command: ["sh", "-c", "until curl -sf http://eureka:8761/actuator/health; do sleep 5; done"]
        - name: wait-for-db
          image: postgres:16-alpine
          command: ["sh", "-c", "until pg_isready -h postgres-media -p 5432 -U media_user; do sleep 3; done"]
      containers:
        - name: media-ms
          image: erickmijael17/ecom-media-ms:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: CONFIG_SERVER_URL
              value: "http://config-server:8888"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ecom-global-secret
                  key: jwt-secret
            - name: DB_HOST
              value: "postgres-media"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: media-ms-secret
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: media-ms-secret
                  key: db-user
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: media-ms-secret
                  key: db-pass
            - name: MEDIA_UPLOAD_PATH
              value: "/app/media"
          volumeMounts:
            - name: media-files
              mountPath: /app/media
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1.5Gi"
              cpu: "1500m"
      volumes:
        - name: media-files
          persistentVolumeClaim:
            claimName: media-ms-files-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: media-ms
  namespace: ecom
  labels:
    app: media-ms
spec:
  type: ClusterIP
  selector:
    app: media-ms
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: media-ms-hpa
  namespace: ecom
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: media-ms
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
