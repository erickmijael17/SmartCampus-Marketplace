name: ecom-search-ms-dev

services:
  postgres-search-ms-dev:
    image: postgres:16-alpine
    container_name: ecom-postgres-search-ms-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecom_search_ms_db
      POSTGRES_USER: ecom
      POSTGRES_PASSWORD: ecom
    ports:
      - "15448:5432"
    volumes:
      - ecom_search_ms_dev_data:/var/lib/postgresql/data

volumes:
  ecom_search_ms_dev_data:
