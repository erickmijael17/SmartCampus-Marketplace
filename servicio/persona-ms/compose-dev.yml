name: persona-ms-dev

services:
  postgres-persona-ms-dev:
    image: postgres:16-alpine
    container_name: postgres-persona-ms-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: persona_ms_db
      POSTGRES_USER: ecom
      POSTGRES_PASSWORD: ecom
    ports:
      - "15440:5432"
    volumes:
      - persona_ms_dev_data:/var/lib/postgresql/data

volumes:
  persona_ms_dev_data:
