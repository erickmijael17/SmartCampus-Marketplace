# =============================================================================
# PERSONA-MS: Secret + PostgreSQL + Microservicio + HPA
# Gestión de perfiles de usuarios/personas del campus
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: persona-ms-secret
  namespace: ecom
  labels:
    app: persona-ms
type: Opaque
stringData:
  db-name: "persona_db"
  db-user: "persona_user"
  db-pass: "persona_db_secure_2024"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: persona-ms-postgres-pvc
  namespace: ecom
  labels:
    app: postgres-persona
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-persona
  namespace: ecom
  labels:
    app: postgres-persona
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-persona
  template:
    metadata:
      labels:
        app: postgres-persona
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: persona-ms-secret
                  key: db-name
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: persona-ms-secret
                  key: db-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: persona-ms-secret
                  key: db-pass
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "persona_user", "-d", "persona_db"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: persona-ms-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-persona
  namespace: ecom
spec:
  type: ClusterIP
  selector:
    app: postgres-persona
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: persona-ms
  namespace: ecom
  labels:
    app: persona-ms
    app.kubernetes.io/component: microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: persona-ms
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: persona-ms
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      initContainers:
        - name: wait-for-config-server
          image: curlimages/curl:8.5.0
          command: ["sh", "-c", "until curl -sf http://config-server:8888/actuator/health; do sleep 5; done"]
        - name: wait-for-eureka
          image: curlimages/curl:8.5.0
          command: ["sh", "-c", "until curl -sf http://eureka:8761/actuator/health; do sleep 5; done"]
        - name: wait-for-db
          image: postgres:16-alpine
          command: ["sh", "-c", "until pg_isready -h postgres-persona -p 5432 -U persona_user; do sleep 3; done"]
      containers:
        - name: persona-ms
          image: erickmijael17/ecom-persona-ms:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: CONFIG_SERVER_URL
              value: "http://config-server:8888"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ecom-global-secret
                  key: jwt-secret
            - name: DB_HOST
              value: "postgres-persona"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: persona-ms-secret
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: persona-ms-secret
                  key: db-user
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: persona-ms-secret
                  key: db-pass
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: persona-ms
  namespace: ecom
  labels:
    app: persona-ms
spec:
  type: ClusterIP
  selector:
    app: persona-ms
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: persona-ms-hpa
  namespace: ecom
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: persona-ms
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
