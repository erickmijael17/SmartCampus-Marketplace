name: publicacion-ms-dev

services:
  postgres-publicacion-ms-dev:
    image: postgres:16-alpine
    container_name: postgres-publicacion-ms-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: publicacion_ms_db
      POSTGRES_USER: ecom
      POSTGRES_PASSWORD: ecom
    ports:
      - "15441:5432"
    volumes:
      - publicacion_ms_dev_data:/var/lib/postgresql/data

volumes:
  publicacion_ms_dev_data:
