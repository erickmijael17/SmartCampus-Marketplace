name: ordenes-dev

services:
  mysql-ordenes-dev:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_ordenes
    ports:
      - "3411:3306" # Tu maquina (cliente externo) -> MySQL dev
    volumes:
      - mysql_ordenes_dev_data:/var/lib/mysql

volumes:
  mysql_ordenes_dev_data: