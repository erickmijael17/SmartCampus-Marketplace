# =============================================================================
# DEPLOYMENT + SERVICE: kafka-exporter
# Exporta métricas de Kafka al formato Prometheus.
# Expone: kafka-exporter:9308/metrics
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter
  namespace: ecom
  labels:
    app: kafka-exporter
    app.kubernetes.io/component: messaging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-exporter
  template:
    metadata:
      labels:
        app: kafka-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "9308"
    spec:
      initContainers:
        - name: wait-for-kafka
          image: curlimages/curl:8.5.0
          command:
            - sh
            - -c
            - |
              until nc -zv kafka 9092 2>/dev/null; do
                echo "Esperando Kafka..."; sleep 5
              done
      containers:
        - name: kafka-exporter
          image: danielqsj/kafka-exporter:v1.9.0
          args:
            - --kafka.server=kafka:9092
          ports:
            - containerPort: 9308
              name: metrics
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9308
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-exporter
  namespace: ecom
  labels:
    app: kafka-exporter
    app.kubernetes.io/component: messaging
spec:
  type: ClusterIP
  selector:
    app: kafka-exporter
  ports:
    - name: metrics
      port: 9308
      targetPort: 9308
