<header class="nav">
  <div class="nav-inner">
    <a routerLink="/" class="brand" aria-label="SmartCampus Marketplace">
      <span class="brand-mark">SC</span>
      <span class="brand-text">Smart<span>Campus</span></span>
    </a>

    <div class="desktop-search">
      <span>⌕</span>
      <input type="search" placeholder="Buscar libros, productos o servicios..." aria-label="Buscar publicaciones">
    </div>

    <nav class="links" [class.open]="menuOpen">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Inicio</a>
      <a routerLink="/publish" routerLinkActive="active">Publicar</a>
      <a routerLink="/chat" routerLinkActive="active">Chat</a>
      <a routerLink="/profile" routerLinkActive="active">Perfil</a>
      @if (session.isAuthenticated()) {
        <button type="button" class="logout" (click)="logout()">Salir</button>
      } @else {
        <a routerLink="/login" routerLinkActive="active">Ingresar</a>
      }
    </nav>

    <button type="button" class="menu" (click)="menuOpen = !menuOpen" aria-label="Abrir navegación">
      {{ menuOpen ? '×' : '☰' }}
    </button>
  </div>
</header>
