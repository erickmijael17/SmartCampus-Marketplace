<div class="min-h-[70vh] flex flex-col items-center justify-center p-6 text-center">
  <div class="bg-white/5 border border-white/10 rounded-2xl p-8 max-w-md w-full backdrop-blur-md">
    
    <div *ngIf="status === 'verifying'" class="mb-6 flex justify-center">
      <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-primary"></div>
    </div>
    
    <div *ngIf="status === 'success'" class="w-20 h-20 bg-green-500/20 text-green-400 rounded-full flex items-center justify-center mx-auto mb-6">
      <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
      </svg>
    </div>

    <div *ngIf="status === 'pending'" class="w-20 h-20 bg-amber-500/20 text-amber-400 rounded-full flex items-center justify-center mx-auto mb-6">
      <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
    </div>

    <div *ngIf="status === 'failure' || status === 'error'" class="w-20 h-20 bg-red-500/20 text-red-400 rounded-full flex items-center justify-center mx-auto mb-6">
      <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </div>

    <h1 class="text-3xl font-bold text-white mb-4">
      {{ title }}
    </h1>

    <p class="text-gray-300 text-lg mb-8 leading-relaxed">
      {{ message }}
    </p>

    <div class="flex flex-col gap-4">
      <a routerLink="/"
         class="w-full py-4 px-6 bg-white/10 hover:bg-white/20 text-white font-medium rounded-xl transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-white/30">
        Volver al inicio
      </a>
    </div>

  </div>
</div>
