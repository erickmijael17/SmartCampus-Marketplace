<section class="container payment-result-shell">
  <article class="payment-result panel">
    <div *ngIf="status === 'verifying'" class="icon-wrap">
      <div class="spinner" aria-hidden="true"></div>
    </div>

    <div *ngIf="status === 'success'" class="icon-wrap icon-success">
      <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
      </svg>
    </div>

    <div *ngIf="status === 'pending'" class="icon-wrap icon-pending">
      <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
    </div>

    <div *ngIf="status === 'failure' || status === 'error'" class="icon-wrap icon-failure">
      <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </div>

    <p class="eyebrow">Resultado de pago</p>
    <h1>{{ title }}</h1>
    <p class="result-message">{{ message }}</p>

    <div class="actions">
      <a routerLink="/" class="btn btn-ghost">
        Volver al inicio
      </a>
    </div>
  </article>
</section>
