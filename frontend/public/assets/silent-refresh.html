<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Silent refresh</title>
  </head>
  <body>
    <script>
      /**
       * Pagina estatica para silent refresh OIDC (iframe oculto).
       * El callback real debe completar el intercambio de tokens cuando authMode = keycloak-oidc.
       */
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'oidc-silent-refresh', tokens: null }, window.location.origin);
      }
    </script>
  </body>
</html>
